name: GhostTrace AI - CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  BACKEND_SERVICE: ghosttrace-ai-backend
  FRONTEND_SERVICE: ghosttrace-ai-frontend
  REGISTRY: gcr.io

jobs:
  lint:
    name: Lint Backend + Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint backend
        run: npm run lint --workspace=backend

      - name: Lint frontend
        run: npm run lint --workspace=frontend

  test:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: backend

      - name: Run unit tests
        run: npm run test:unit
        working-directory: backend
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB_NAME: ghosttrace_test
          JWT_SECRET: test-secret-ci
          MCP_AUTH_SECRET: test-mcp-ci
          GEMINI_MODEL: gemini-3.0-pro

      - name: Run simulation tests
        run: npm run test:simulation
        working-directory: backend
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB_NAME: ghosttrace_test
          JWT_SECRET: test-secret-ci
          MCP_AUTH_SECRET: test-mcp-ci
          GEMINI_MODEL: gemini-3.0-pro

      - name: Run integration tests
        run: npm run test:integration
        working-directory: backend
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB_NAME: ghosttrace_test
          JWT_SECRET: test-secret-ci
          MCP_AUTH_SECRET: test-mcp-ci
          GEMINI_MODEL: gemini-3.0-pro

  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build and push backend image
        run: |
          docker build \
            -f infra/docker/Dockerfile.backend \
            -t $REGISTRY/$PROJECT_ID/$BACKEND_SERVICE:$GITHUB_SHA \
            -t $REGISTRY/$PROJECT_ID/$BACKEND_SERVICE:latest \
            .
          docker push $REGISTRY/$PROJECT_ID/$BACKEND_SERVICE:$GITHUB_SHA
          docker push $REGISTRY/$PROJECT_ID/$BACKEND_SERVICE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $BACKEND_SERVICE \
            --image $REGISTRY/$PROJECT_ID/$BACKEND_SERVICE:$GITHUB_SHA \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --set-secrets="MONGODB_URI=mongodb-uri:latest,GOOGLE_API_KEY=google-api-key:latest,JWT_SECRET=jwt-secret:latest,MCP_AUTH_SECRET=mcp-auth-secret:latest" \
            --set-env-vars="NODE_ENV=production,GEMINI_MODEL=gemini-3.0-pro,MONGODB_DB_NAME=ghosttrace" \
            --min-instances=1 \
            --max-instances=10 \
            --memory=1Gi \
            --cpu=2 \
            --concurrency=100 \
            --timeout=300

  deploy-frontend:
    name: Deploy Frontend to Cloud Run
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker
        run: gcloud auth configure-docker --quiet

      - name: Get backend URL
        run: |
          URL=$(gcloud run services describe $BACKEND_SERVICE --region $REGION --format 'value(status.url)')
          echo "BACKEND_URL=$URL" >> $GITHUB_ENV

      - name: Build and push frontend image
        run: |
          docker build \
            -f infra/docker/Dockerfile.frontend \
            --build-arg NEXT_PUBLIC_API_URL=$BACKEND_URL \
            --build-arg NEXT_PUBLIC_WS_URL=$BACKEND_URL \
            -t $REGISTRY/$PROJECT_ID/$FRONTEND_SERVICE:$GITHUB_SHA \
            -t $REGISTRY/$PROJECT_ID/$FRONTEND_SERVICE:latest \
            .
          docker push $REGISTRY/$PROJECT_ID/$FRONTEND_SERVICE:$GITHUB_SHA
          docker push $REGISTRY/$PROJECT_ID/$FRONTEND_SERVICE:latest

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy $FRONTEND_SERVICE \
            --image $REGISTRY/$PROJECT_ID/$FRONTEND_SERVICE:$GITHUB_SHA \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars="NEXT_PUBLIC_API_URL=$BACKEND_URL,NEXT_PUBLIC_WS_URL=$BACKEND_URL" \
            --min-instances=1 \
            --max-instances=5 \
            --memory=512Mi \
            --cpu=1

  smoke-deploy:
    name: Smoke Test Deployed Frontend/Backend
    runs-on: ubuntu-latest
    needs: deploy-frontend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Resolve service URLs
        run: |
          BACKEND_URL=$(gcloud run services describe $BACKEND_SERVICE --region $REGION --format 'value(status.url)')
          FRONTEND_URL=$(gcloud run services describe $FRONTEND_SERVICE --region $REGION --format 'value(status.url)')
          echo "SMOKE_BACKEND_URL=$BACKEND_URL" >> $GITHUB_ENV
          echo "SMOKE_FRONTEND_URL=$FRONTEND_URL" >> $GITHUB_ENV

      - name: Run smoke tests
        run: node scripts/smoke-deploy.js
        env:
          SMOKE_BACKEND_URL: ${{ env.SMOKE_BACKEND_URL }}
          SMOKE_FRONTEND_URL: ${{ env.SMOKE_FRONTEND_URL }}
          SMOKE_DEMO_EMAIL: ${{ secrets.SMOKE_DEMO_EMAIL }}
          SMOKE_DEMO_PASSWORD: ${{ secrets.SMOKE_DEMO_PASSWORD }}
          SMOKE_USER_EMAIL: ${{ secrets.SMOKE_USER_EMAIL }}
          SMOKE_USER_PASSWORD: ${{ secrets.SMOKE_USER_PASSWORD }}
          SMOKE_ADMIN_EMAIL: ${{ secrets.SMOKE_ADMIN_EMAIL }}
          SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
          SMOKE_MFA_CODE: ${{ secrets.SMOKE_MFA_CODE }}

  deploy-agentbuilder:
    name: Deploy Agent Builder manifest
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure gcloud
        run: |
          gcloud auth configure-docker --quiet
          gcloud components update --quiet || true

      - name: Deploy Agent Builder manifest
        run: |
          gcloud alpha agentbuilder deploy \
            --config=infra/agent-builder.yaml \
            --project=$PROJECT_ID \
            --region=$REGION \
            --quiet
