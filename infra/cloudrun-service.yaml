apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ghosttrace-ai-backend
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/description: "GhostTrace AI — Fraud Detection Backend"
spec:
  template:
    metadata:
      annotations:
        # Scale to zero when idle (cost savings)
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        # Keep connections alive
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 100
      timeoutSeconds: 300
      serviceAccountName: ghosttrace-ai-sa@PROJECT_ID.iam.gserviceaccount.com
      containers:
        - image: gcr.io/PROJECT_ID/ghosttrace-backend:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "2"
              memory: "1Gi"
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "8080"
            - name: WAIT_FOR_DB
              value: "true"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-uri
                  key: latest
            - name: MONGODB_DB_NAME
              value: "ghosttrace"
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: google-api-key
                  key: latest
            - name: GEMINI_MODEL
              value: "gemini-3.0-pro"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: latest
            - name: MCP_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: mcp-auth-secret
                  key: latest
            - name: CORS_ORIGINS
              value: "https://ghosttrace-ai.web.app,https://ghosttrace-frontend-HASH-uc.a.run.app"
            - name: SEED_DEFAULT_USERS
              value: "true"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
